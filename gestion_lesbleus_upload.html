<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LESBLEUS S.A. · Gestión</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#2a2a3a;
  --accent:#6c63ff;--accent2:#00d4aa;--danger:#ff4f6a;--warn:#f7b74f;--ok:#4fff7a;
  --text:#f0f0ff;--muted:#6b6b8a;--font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 60% 40%,#1a0a3e 0%,var(--bg) 70%)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:380px;max-width:calc(100vw - 32px)}
.login-logo{font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:32px}
label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
input{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
.field{margin-bottom:18px}
.btn{padding:12px 20px;border-radius:10px;border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{opacity:.88}.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b63ff);color:#fff;width:100%}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-danger{background:var(--danger);color:#fff}
.btn-ok{background:var(--ok);color:#000}
.btn-wa{background:#25D366;color:#fff}
.err-box{background:rgba(255,79,106,.12);border:1px solid rgba(255,79,106,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);display:none;margin-top:12px}
/* DASHBOARD */
#dash{display:none;min-height:100vh}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.brand{font-size:17px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge-role{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3)}
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:16px 8px;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:2px;transition:all .15s}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(108,99,255,.15);color:var(--accent)}
.main{flex:1;padding:28px 32px;overflow-y:auto;background:var(--bg)}
/* CARDS */
.page-title{font-size:22px;font-weight:700;margin-bottom:4px}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:28px;font-weight:700;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-head h3{font-size:15px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:11px 16px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(42,42,58,.5)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(108,99,255,.04)}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
.s-pendiente{background:#fef3c7;color:#92400e}
.s-enproceso{background:#dbeafe;color:#1e40af}
.s-enviado{background:#dcfce7;color:#166534}
.s-entregado{background:#ccfbf1;color:#065f46}
.s-cancelado{background:#fee2e2;color:#991b1b}
.td-actions{display:flex;gap:6px;flex-wrap:wrap}
/* MODAL */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:500px;max-width:94vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
select{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
select:focus{border-color:var(--accent)}
textarea{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;resize:vertical;min-height:70px}
/* TOAST */
#toast-wrap{position:fixed;top:64px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;min-width:240px;display:flex;align-items:center;gap:10px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* IA */
.ia-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px}
.ia-title{font-size:15px;font-weight:700;margin-bottom:6px}
.ia-desc{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.ia-result{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.6;white-space:pre-wrap;display:none;margin-top:12px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.filter-bar input,.filter-bar select{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;width:auto}
.filter-bar input{flex:1;min-width:160px}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">LESBLEUS S.A.</div>
    <div class="login-sub">Sistema de gestión interno</div>
    <div class="field"><label>Usuario</label><input type="text" id="l-user" placeholder="encargado1" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="login()">Ingresar →</button>
    <div class="err-box" id="l-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="topbar">
    <div class="brand">LESBLEUS S.A.</div>
    <div class="topbar-right">
      <span id="tb-user" style="font-size:13px;color:var(--muted)"></span>
      <span class="badge-role" id="tb-role"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<div id="modal-bg"><div class="modal" id="modal"></div></div>
<div id="toast-wrap"></div>

<script>
const USERS={
  encargado1:{pass:'encargado123',role:'encargado',name:'Encargado Rivera'},
  encargado2:{pass:'encargado456',role:'encargado',name:'Encargado Gómez'},
  agente1:{pass:'agente123',role:'agente',name:'Agente López'},
  agente2:{pass:'agente456',role:'agente',name:'Agente García'},
  cliente1:{pass:'cliente123',role:'cliente',name:'Cliente Principal'},
};

let S={session:null,orders:[],page:'inicio'};
const FB_CONFIG={apiKey:"AIzaSyAuYGm8PHPqNfMnBMNZBuC4CmWZ4pJs8yk",authDomain:"lesbleuscars-94e0c.firebaseapp.com",projectId:"lesbleuscars-94e0c",storageBucket:"lesbleuscars-94e0c.firebasestorage.app",messagingSenderId:"719264434324",appId:"1:719264434324:web:a51090a5fec7a0fe338c81"};
let fbdb=null;
if(typeof firebase!=='undefined'){try{firebase.initializeApp(FB_CONFIG);fbdb=firebase.firestore();}catch(e){}}

async function saveImgFirebase(prodId, url){
  if(fbdb){
    try{await fbdb.collection('product_images').doc(String(prodId)).set({url,updatedAt:firebase.firestore.Timestamp.now()});}
    catch(e){console.warn('Firebase img:',e);}
  }
  localStorage.setItem('img_'+prodId, url);
}


function login(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value.trim();
  const usr=USERS[u];
  if(!usr||usr.pass!==p){
    const e=document.getElementById('l-err');e.style.display='block';e.textContent='Usuario o contraseña incorrectos.';return;
  }
  S.session={user:u,...usr};
  loadOrders();
  document.getElementById('login').style.display='none';
  document.getElementById('dash').style.display='block';
  document.getElementById('tb-user').textContent=usr.name;
  document.getElementById('tb-role').textContent={encargado:'Encargado',agente:'Agente',cliente:'Cliente'}[usr.role];
  renderSidebar();navigate('inicio');
}

function logout(){S.session=null;document.getElementById('login').style.display='flex';document.getElementById('dash').style.display='none';}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login').style.display!=='none')login();});

// STORAGE
function saveOrders(){localStorage.setItem('lesbleus_orders',JSON.stringify(S.orders));}
function loadOrders(){try{S.orders=JSON.parse(localStorage.getItem('lesbleus_orders')||localStorage.getItem('viales_orders')||'[]');}catch(e){S.orders=[];}}
// SIDEBAR
const NAV={
  encargado:[{p:'inicio',i:'🏠',l:'Inicio'},{p:'pedidos',i:'📦',l:'Pedidos'},{p:'agentes',i:'👥',l:'Agentes'},{p:'reportes',i:'📊',l:'Reportes'},{p:'ia-gestion',i:'🤖',l:'Agente IA'},{p:'ia-factura',i:'🧾',l:'Facturación IA'},{p:'ia-imagenes',i:'🖼️',l:'Imágenes IA'}],
  agente:[{p:'inicio',i:'🏠',l:'Inicio'},{p:'bandeja',i:'📥',l:'Bandeja'},{p:'mis-pedidos',i:'📦',l:'Mis pedidos'},{p:'wa',i:'💬',l:'WhatsApp'}],
  cliente:[{p:'inicio',i:'🏠',l:'Inicio'},{p:'mi-pedido',i:'📦',l:'Mi pedido'}],
};
function renderSidebar(){
  const nav=NAV[S.session.role]||[];
  document.getElementById('sidebar').innerHTML=nav.map(n=>`<div class="nav-item${S.page===n.p?' active':''}" onclick="navigate('${n.p}')">${n.i} ${n.l}</div>`).join('');
}
function navigate(p){S.page=p;renderSidebar();const pages={inicio:pageInicio,pedidos:pagePedidos,bandeja:pageBandeja,'mis-pedidos':pageMisPedidos,'mi-pedido':pageMiPedido,agentes:pageAgentes,reportes:pageReportes,wa:pageWA,'ia-gestion':pageIAGestion,'ia-factura':pageIAFactura,'ia-imagenes':pageIAImagenes};(pages[p]||pageInicio)();}

// UTILS
function id(i){return document.getElementById(i);}
function ls(s){return{pendiente:'Pendiente',enproceso:'En proceso',enviado:'Enviado',entregado:'Entregado',cancelado:'Cancelado'}[s]||s;}
function num(m){return parseFloat((m||'').replace(/[^\d.,]/g,'').replace(',','.')||0);}
function oid(o){return o.id||'';}
function findO(i){return S.orders.find(o=>o.id===i);}
function toast(msg,type='ok'){const w=id('toast-wrap'),t=document.createElement('div');t.className='toast';t.innerHTML=`<span>${{ok:'✅',err:'❌',warn:'⚠️',info:'ℹ️'}[type]||'ℹ️'}</span><span>${msg}</span>`;w.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3000);}
function openModal(html){id('modal-bg').style.display='flex';id('modal').innerHTML=html;}
function closeModal(){id('modal-bg').style.display='none';}
id('modal-bg').addEventListener('click',e=>{if(e.target===id('modal-bg'))closeModal();});

// PAGES
function pageInicio(){
  const role=S.session.role;
  const t={pendiente:0,enproceso:0,enviado:0,entregado:0,cancelado:0};
  S.orders.forEach(o=>{if(t[o.estado]!==undefined)t[o.estado]++;});
  let stats='';
  if(role!=='cliente'){
    stats=`<div class="stat-grid">
      <div class="stat"><div class="stat-icon">📦</div><div class="stat-lbl">Total</div><div class="stat-val">${S.orders.length}</div></div>
      <div class="stat"><div class="stat-icon">⏳</div><div class="stat-lbl">Pendientes</div><div class="stat-val" style="color:var(--warn)">${t.pendiente}</div></div>
      <div class="stat"><div class="stat-icon">🔄</div><div class="stat-lbl">En proceso</div><div class="stat-val" style="color:var(--accent)">${t.enproceso}</div></div>
      <div class="stat"><div class="stat-icon">✅</div><div class="stat-lbl">Entregados</div><div class="stat-val" style="color:var(--ok)">${t.entregado}</div></div>
    </div>`;
  }
  id('main').innerHTML=`<div class="page-title">Hola, ${S.session.name.split(' ')[0]} 👋</div><div class="page-sub">Bienvenido al sistema LESBLEUS S.A.</div>${stats}`;
}

function pagePedidos(){
  const isEnc=S.session.role==='encargado';
  const filtro=(window._filtro||'').toLowerCase();
  const filtroEst=window._filtroEst||'';
  let list=S.orders;
  if(filtro)list=list.filter(o=>(o.producto||'').toLowerCase().includes(filtro)||(o.clienteNombre||'').toLowerCase().includes(filtro)||(o.id||'').toLowerCase().includes(filtro));
  if(filtroEst)list=list.filter(o=>o.estado===filtroEst);
  const rows=list.map(o=>`<tr>
    <td><b>${o.id}</b></td><td>${o.producto}</td><td>${o.clienteNombre||''}</td>
    <td><span class="pill s-${o.estado}">${ls(o.estado)}</span></td>
    <td>${o.fecha||''}</td><td>${o.monto||''}</td>
    <td class="td-actions">
      <button class="btn btn-ghost btn-sm" onclick="modalEditar('${o.id}')">✏️</button>
      ${o.tel?`<button class="btn btn-wa btn-sm" onclick="waNotif('${o.id}')">💬</button>`:''}
      ${isEnc?`<button class="btn btn-danger btn-sm" onclick="eliminar('${o.id}')">🗑</button>`:''}
    </td>
  </tr>`).join('')||`<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--muted)">Sin resultados.</td></tr>`;
  id('main').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div><div class="page-title">📦 Pedidos</div><div class="page-sub">${list.length} de ${S.orders.length} registros</div></div>
      <div style="display:flex;gap:8px">
        ${isEnc?`<button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇️ CSV</button>`:''}
        ${isEnc?`<button class="btn btn-primary btn-sm" onclick="modalNuevo()">+ Nuevo pedido</button>`:''}
      </div>
    </div>
    <div class="filter-bar">
      <input type="text" placeholder="🔍 Buscar..." value="${window._filtro||''}" oninput="window._filtro=this.value;pagePedidos()">
      <select onchange="window._filtroEst=this.value;pagePedidos()">
        <option value="">Todos los estados</option>
        ${['pendiente','enproceso','enviado','entregado','cancelado'].map(s=>`<option value="${s}"${filtroEst===s?' selected':''}>${ls(s)}</option>`).join('')}
      </select>
      ${(filtro||filtroEst)?`<button class="btn btn-ghost btn-sm" onclick="window._filtro='';window._filtroEst='';pagePedidos()">✕ Limpiar</button>`:''}
    </div>
    <div class="card"><div class="card-head"><h3>Listado</h3></div>
    <table><thead><tr><th>ID</th><th>Producto</th><th>Cliente</th><th>Estado</th><th>Fecha</th><th>Monto</th><th>Acciones</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function pageBandeja(){
  const pend=S.orders.filter(o=>o.estado==='pendiente');
  const rows=pend.map(o=>`<tr>
    <td><b>${o.id}</b></td><td>${o.producto}</td><td>${o.clienteNombre||''}</td><td>${o.fecha||''}</td><td>${o.monto||''}</td>
    <td><button class="btn btn-ok btn-sm" onclick="tomarPedido('${o.id}')">✔ Tomar</button></td>
  </tr>`).join('')||`<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--muted)">Sin pedidos pendientes 🎉</td></tr>`;
  id('main').innerHTML=`<div class="page-title">📥 Bandeja de entrada</div><div class="page-sub">${pend.length} pedidos sin asignar</div>
    <div class="card"><div class="card-head"><h3>Pendientes</h3></div>
    <table><thead><tr><th>ID</th><th>Producto</th><th>Cliente</th><th>Fecha</th><th>Monto</th><th>Acción</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function pageMisPedidos(){
  const mine=S.orders.filter(o=>o.agente===S.session.user);
  const rows=mine.map(o=>`<tr>
    <td><b>${o.id}</b></td><td>${o.producto}</td><td>${o.clienteNombre||''}</td>
    <td><span class="pill s-${o.estado}">${ls(o.estado)}</span></td>
    <td>${o.monto||''}</td>
    <td class="td-actions">
      <button class="btn btn-ghost btn-sm" onclick="modalEditar('${o.id}')">✏️</button>
      ${o.tel?`<button class="btn btn-wa btn-sm" onclick="waNotif('${o.id}')">💬</button>`:''}
    </td>
  </tr>`).join('')||`<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--muted)">Sin pedidos asignados.</td></tr>`;
  id('main').innerHTML=`<div class="page-title">📦 Mis pedidos</div><div class="page-sub">${mine.length} pedidos asignados a vos</div>
    <div class="card"><div class="card-head"><h3>Mis pedidos</h3></div>
    <table><thead><tr><th>ID</th><th>Producto</th><th>Cliente</th><th>Estado</th><th>Monto</th><th>Acciones</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function pageMiPedido(){
  const mine=S.orders.filter(o=>o.cliente===S.session.user);
  const rows=mine.map(o=>`<tr>
    <td><b>${o.id}</b></td><td>${o.producto}</td>
    <td><span class="pill s-${o.estado}">${ls(o.estado)}</span></td>
    <td>${o.fecha||''}</td><td>${o.monto||''}</td>
    <td>${o.linkPago?`<a href="${o.linkPago}" target="_blank" class="btn btn-primary btn-sm">💳 Pagar</a>`:'-'}</td>
  </tr>`).join('')||`<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--muted)">No tenés pedidos registrados.</td></tr>`;
  id('main').innerHTML=`<div class="page-title">📦 Mi pedido</div><div class="page-sub">Estado de tus compras</div>
    <div class="card"><div class="card-head"><h3>Mis pedidos</h3></div>
    <table><thead><tr><th>ID</th><th>Producto</th><th>Estado</th><th>Fecha</th><th>Monto</th><th>Pago</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function pageAgentes(){
  const agentes=Object.entries(USERS).filter(([k,v])=>v.role==='agente').map(([k,v])=>({key:k,...v}));
  const rows=agentes.map(a=>{
    const pedidos=S.orders.filter(o=>o.agente===a.key);
    const enproc=pedidos.filter(o=>o.estado==='enproceso').length;

async function callIA(prompt,resId){
  const el=id(resId);if(!el)return;
  el.style.display='block';el.innerHTML='<span class="spin"></span> Agente procesando...';
  try{
    const resp=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    if(data.error){el.textContent='❌ '+data.error;return;}
    el.textContent=data.content?.map(c=>c.text||'').join('')||'Sin respuesta.';
  }catch(e){el.textContent='❌ Error al conectar con el agente IA: '+e.message;}
}

async function runSupervisor(){
  const stats={total:S.orders.length,pendiente:S.orders.filter(o=>o.estado==='pendiente').length,enproceso:S.orders.filter(o=>o.estado==='enproceso').length,enviado:S.orders.filter(o=>o.estado==='enviado').length,sinAgente:S.orders.filter(o=>o.estado==='pendiente'&&!o.agente).length,sinFactura:S.orders.filter(o=>o.pagado&&!o.facturaEmitida).length};
  await callIA(`Sos el supervisor de pedidos de LESBLEUS S.A., empresa de repuestos automotores argentina. Analizá estos datos y generá un reporte ejecutivo en español con alertas urgentes y recomendaciones concretas: ${JSON.stringify(stats)}`,'res-supervisor');
}

async function runAsignador(){
  const pend=S.orders.filter(o=>o.estado==='pendiente'&&!o.agente);
  const agentes=Object.entries(USERS).filter(([k,v])=>v.role==='agente').map(([k,v])=>({user:k,name:v.name,carga:S.orders.filter(o=>o.agente===k&&o.estado==='enproceso').length}));
  if(!pend.length){const el=id('res-asignador');el.style.display='block';el.textContent='✅ No hay pedidos pendientes sin asignar.';return;}
  // Auto-asignar round-robin por carga
  let asignados=[];
  for(const o of pend){
    agentes.sort((a,b)=>a.carga-b.carga);
    const ag=agentes[0];
    o.agente=ag.user;o.estado='enproceso';ag.carga++;
    asignados.push(`${o.id} → ${ag.name}`);
  }
  saveOrders();
  const el=id('res-asignador');el.style.display='block';
  el.textContent=`✅ ${asignados.length} pedidos asignados automáticamente:\n\n${asignados.join('\n')}`;
  toast(`IA asignó ${asignados.length} pedidos.`);
}

async function runComunicador(){
  const activos=S.orders.filter(o=>['pendiente','enproceso','enviado'].includes(o.estado)&&o.tel);
  if(!activos.length){const el=id('res-comunicador');el.style.display='block';el.textContent='No hay pedidos activos con teléfono registrado.';return;}
  const lista=activos.map(o=>`- ${o.clienteNombre} (${o.producto}, estado: ${ls(o.estado)})`).join('\n');
  await callIA(`Sos el agente comunicador de LESBLEUS S.A. Generá un mensaje de WhatsApp personalizado para cada cliente, adaptado a su estado de pedido. Sé amigable y profesional. Clientes:\n${lista}`,'res-comunicador');
}

async function runFacturador(){

      await saveImgFirebase(item.id, item.url);
