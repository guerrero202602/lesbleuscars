<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LESBLEUS S.A. · Gestión</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070f;--surface:#0e0e1a;--card:#13131f;--card2:#181828;--border:#1e1e30;--border2:#2a2a40;
  --accent:#7c6dfa;--accent2:#06d6a0;--accent3:#f72585;
  --danger:#ff3860;--warn:#ffb347;--ok:#06d6a0;
  --text:#eeeeff;--muted:#5a5a7a;--muted2:#888899;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --glow:0 0 24px rgba(124,109,250,.15);
  --radius:12px;--radius-lg:18px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1a0a3e 0%,#07070f 65%);position:relative;overflow:hidden}
#login::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%237c6dfa' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.login-box{background:rgba(19,19,31,.85);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:52px 44px;width:400px;max-width:calc(100vw - 32px);position:relative;box-shadow:var(--glow)}
.login-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(124,109,250,.25) 0%,transparent 70%);pointer-events:none}
.login-logo{font-size:26px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;color:var(--text)}
.login-logo span{color:var(--accent)}
.login-sub{color:var(--muted2);font-size:12px;margin-bottom:36px;font-weight:400}
label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px}
input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,109,250,.12)}
.field{margin-bottom:20px}
.btn{padding:11px 20px;border-radius:var(--radius);border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px;letter-spacing:.01em}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;width:100%;justify-content:center;box-shadow:0 4px 16px rgba(124,109,250,.3)}
.btn-primary:hover{background:#8f81fb;box-shadow:0 6px 20px rgba(124,109,250,.4)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-danger{background:rgba(255,56,96,.15);color:var(--danger);border:1px solid rgba(255,56,96,.3)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ok{background:rgba(6,214,160,.15);color:var(--ok);border:1px solid rgba(6,214,160,.3)}
.btn-ok:hover{background:var(--ok);color:#000}
.btn-wa{background:#25D366;color:#fff}
.err-box{background:rgba(255,56,96,.1);border:1px solid rgba(255,56,96,.25);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);display:none;margin-top:12px}

/* DASHBOARD */
#dash{display:none;min-height:100vh}
.topbar{height:58px;background:rgba(14,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.brand{font-size:16px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.brand span{color:var(--accent)}
.brand-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);display:inline-block;margin-left:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge-role{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(124,109,250,.12);color:var(--accent);border:1px solid rgba(124,109,250,.2)}
.layout{display:flex;min-height:calc(100vh - 58px)}

/* SIDEBAR */
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-section{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:10px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted2);margin-bottom:1px;transition:all .15s;position:relative}
.nav-item:hover{background:var(--card2);color:var(--text)}
.nav-item.active{background:rgba(124,109,250,.12);color:var(--accent);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sidebar-footer{margin-top:auto;padding:8px 4px;border-top:1px solid var(--border)}

/* MAIN */
.main{flex:1;padding:32px 36px;overflow-y:auto;background:var(--bg)}
.page-title{font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:-.5px}
.page-sub{color:var(--muted2);font-size:13px;margin-bottom:28px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:border-color .2s}
.stat:hover{border-color:var(--border2)}
.stat::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;filter:blur(30px);opacity:.3}
.stat.c-accent::after{background:var(--accent)}
.stat.c-ok::after{background:var(--ok)}
.stat.c-warn::after{background:var(--warn)}
.stat.c-danger::after{background:var(--danger)}
.stat-icon{font-size:18px;margin-bottom:10px;opacity:.9}
.stat-lbl{font-size:11px;color:var(--muted2);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:32px;font-weight:700;margin-top:2px;letter-spacing:-1px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-head h3{font-size:14px;font-weight:600;color:var(--text)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);background:rgba(255,255,255,.01)}
td{padding:13px 16px;font-size:13px;border-bottom:1px solid rgba(30,30,48,.8);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(124,109,250,.04)}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.s-pendiente{background:rgba(255,179,71,.12);color:#ffb347;border:1px solid rgba(255,179,71,.2)}
.s-enproceso{background:rgba(124,109,250,.12);color:var(--accent);border:1px solid rgba(124,109,250,.2)}
.s-enviado{background:rgba(6,214,160,.12);color:var(--ok);border:1px solid rgba(6,214,160,.2)}
.s-entregado{background:rgba(6,214,160,.2);color:#04b07d;border:1px solid rgba(6,214,160,.3)}
.s-cancelado{background:rgba(255,56,96,.1);color:var(--danger);border:1px solid rgba(255,56,96,.2)}
.td-actions{display:flex;gap:6px;flex-wrap:wrap}

/* MODAL */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:30px;width:520px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:22px;letter-spacing:-.3px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
select{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s}
select:focus{border-color:var(--accent)}
textarea{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:var(--font);outline:none;resize:vertical;min-height:80px;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}

/* TOAST */
#toast-wrap{position:fixed;top:68px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;font-size:13px;min-width:240px;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:all}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* IA */
.ia-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:14px;transition:border-color .2s}
.ia-card:hover{border-color:var(--border2)}
.ia-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;background:rgba(124,109,250,.12);color:var(--accent);border:1px solid rgba(124,109,250,.2);padding:3px 10px;border-radius:20px;margin-bottom:12px}
.ia-title{font-size:15px;font-weight:700;margin-bottom:6px;letter-spacing:-.2px}
.ia-desc{font-size:13px;color:var(--muted2);margin-bottom:16px;line-height:1.6}
.ia-result{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:13px;line-height:1.7;white-space:pre-wrap;display:none;margin-top:14px;font-family:var(--font);color:var(--text)}

/* SPINNER */
.spin{width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FILTER BAR */
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filter-bar input,.filter-bar select{padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;width:auto;transition:border-color .2s}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}
.filter-bar input{flex:1;min-width:180px}

/* SYNC BADGE */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;animation:pulse 2s infinite;margin-right:6px}
.sync-dot.off{background:var(--muted);animation:none}

/* PAGE FADE */
.main{animation:none}
.page-fade{animation:fadePage .2s ease}
@keyframes fadePage{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .sidebar{width:56px}.nav-item span.nav-label{display:none}
  .main{padding:20px 16px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .field-row{grid-template-columns:1fr}
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-glow"></div>
    <div class="login-logo">LES<span>BLEUS</span> S.A.</div>
    <div class="login-sub">Sistema de gestión interno · Acceso restringido</div>
    <div class="field"><label>Usuario</label><input type="text" id="l-user" placeholder="encargado1" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="login()">Ingresar →</button>
    <div class="err-box" id="l-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="topbar">
    <div class="brand">LES<span>BLEUS</span> S.A.<span class="brand-dot"></span></div>
    <div class="topbar-right">
      <span id="tb-sync" style="font-size:12px;color:var(--muted2);display:flex;align-items:center"><span class="sync-dot off" id="sync-dot"></span><span id="sync-txt">local</span></span>
      <span id="tb-user" style="font-size:13px;color:var(--muted2)"></span>
      <span class="badge-role" id="tb-role"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<div id="modal-bg"><div class="modal" id="modal"></div></div>
<div id="toast-wrap"></div>

<script>
const USERS={
  encargado1:{pass:'encargado123',role:'encargado',name:'Encargado Rivera'},
  encargado2:{pass:'encargado456',role:'encargado',name:'Encargado Gómez'},
  agente1:{pass:'agente123',role:'agente',name:'Agente López'},
  agente2:{pass:'agente456',role:'agente',name:'Agente García'},
  cliente1:{pass:'cliente123',role:'cliente',name:'Cliente Principal'},
  com1:{pass:'com123',role:'comunicaciones',name:'Comunicaciones'},
};

let S={session:null,orders:[],tickets:[],clients:[],page:'inicio'};
const FB_CONFIG={apiKey:"AIzaSyAuYGm8PHPqNfMnBMNZBuC4CmWZ4pJs8yk",authDomain:"lesbleuscars-94e0c.firebaseapp.com",projectId:"lesbleuscars-94e0c",storageBucket:"lesbleuscars-94e0c.firebasestorage.app",messagingSenderId:"719264434324",appId:"1:719264434324:web:a51090a5fec7a0fe338c81"};
let fbdb=null;
if(typeof firebase!=='undefined'){try{firebase.initializeApp(FB_CONFIG);fbdb=firebase.firestore();}catch(e){}}

async function saveImgFirebase(prodId, url){
  if(fbdb){
    try{await fbdb.collection('product_images').doc(String(prodId)).set({url,updatedAt:firebase.firestore.Timestamp.now()});}
    catch(e){console.warn('Firebase img:',e);}
  }
  localStorage.setItem('img_'+prodId, url);
}


function login(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value.trim();
  const usr=USERS[u];
  if(!usr||usr.pass!==p){
    const e=document.getElementById('l-err');e.style.display='block';e.textContent='Usuario o contraseña incorrectos.';return;
  }
  S.session={user:u,...usr};
  loadOrders();
  document.getElementById('login').style.display='none';
  document.getElementById('dash').style.display='block';
  document.getElementById('tb-user').textContent=usr.name;
  document.getElementById('tb-role').textContent={encargado:'Encargado',agente:'Agente',cliente:'Cliente'}[usr.role];
  startFirestoreSync();
  renderSidebar();navigate('inicio');
}

function logout(){S.session=null;document.getElementById('login').style.display='flex';document.getElementById('dash').style.display='none';}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login').style.display!=='none')login();});

// STORAGE + FIRESTORE SYNC
let unsubscribeOrders=null;

async function saveOrders(){
  localStorage.setItem('lesbleus_orders',JSON.stringify(S.orders));
  localStorage.setItem('lesbleus_tickets',JSON.stringify(S.tickets));
  localStorage.setItem('lesbleus_clients',JSON.stringify(S.clients));
  if(fbdb){
    try{
      const batch=fbdb.batch();
      S.orders.forEach(o=>{batch.set(fbdb.collection('orders').doc(o.id),{...o,_ts:firebase.firestore.Timestamp.now()});});
      S.tickets.forEach(t=>{batch.set(fbdb.collection('tickets').doc(t.id),{...t,_ts:firebase.firestore.Timestamp.now()});});
      S.clients.forEach(c=>{batch.set(fbdb.collection('clients').doc(c.id),{...c,_ts:firebase.firestore.Timestamp.now()});});
      await batch.commit();
    }catch(e){console.warn('Firestore save:',e);}
  }
}

function loadOrders(){
  try{S.orders=JSON.parse(localStorage.getItem('lesbleus_orders')||localStorage.getItem('viales_orders')||'[]');}catch(e){S.orders=[];}
  try{S.tickets=JSON.parse(localStorage.getItem('lesbleus_tickets')||'[]');}catch(e){S.tickets=[];}
  try{S.clients=JSON.parse(localStorage.getItem('lesbleus_clients')||'[]');}catch(e){S.clients=[];}
}

function startFirestoreSync(){
  if(!fbdb)return;
  if(unsubscribeOrders)unsubscribeOrders();
  unsubscribeOrders=fbdb.collection('orders').orderBy('_ts','desc').onSnapshot(snap=>{
    if(snap.empty&&S.orders.length>0){saveOrders();return;}
    const remote=snap.docs.map(d=>d.data());
    if(remote.length>0){
      S.orders=remote;
      localStorage.setItem('lesbleus_orders',JSON.stringify(S.orders));
    }
    const dot=document.getElementById('sync-dot');
    const txt=document.getElementById('sync-txt');
    if(dot){dot.classList.remove('off');dot.style.background='var(--ok)';}
    if(txt)txt.textContent='en línea';
    const cur=document.getElementById('main');
    if(cur&&S.page)navigate(S.page);
  },err=>{
    console.warn('Firestore sync error:',err);
    const dot=document.getElementById('sync-dot');
    const txt=document.getElementById('sync-txt');
    if(dot){dot.classList.add('off');}
    if(txt)txt.textContent='local';
  });
}
// SIDEBAR
const NAV={
  encargado:[{p:'inicio',i:'🏠',l:'Inicio'},{p:'pedidos',i:'📦',l:'Pedidos'},{p:'clientes',i:'👤',l:'Clientes'},{p:'tickets',i:'🎫',l:'Tickets'},{p:'agentes',i:'👥',l:'Agentes'},{p:'reportes',i:'📊',l:'Reportes'},{p:'ia-gestion',i:'🤖',l:'Agente IA'},{p:'ia-factura',i:'🧾',l:'Facturación IA'},{p:'ia-imagenes',i:'🖼️',l:'Imágenes IA'}],
  agente:[{p:'inicio',i:'🏠',l:'Inicio'},{p:'bandeja',i:'📥',l:'Bandeja'},{p:'mis-pedidos',i:'📦',l:'Mis pedidos'},{p:'mis-tickets',i:'🎫',l:'Mis tickets'}],
  comunicaciones:[{p:'inicio',i:'🏠',l:'Inicio'},{p:'comunicaciones',i:'💬',l:'Para notificar'}],
  cliente:[{p:'inicio',i:'🏠',l:'Inicio'},{p:'mi-pedido',i:'📦',l:'Mi pedido'}],
};
function renderSidebar(){
  const nav=NAV[S.session.role]||[];
  document.getElementById('sidebar').innerHTML=`
    <div class="sidebar-section">Menú</div>
    ${nav.map(n=>`<div class="nav-item${S.page===n.p?' active':''}" onclick="navigate('${n.p}')"><span class="nav-icon">${n.i}</span><span class="nav-label">${n.l}</span></div>`).join('')}
    <div class="sidebar-footer"><div style="font-size:11px;color:var(--muted);text-align:center">LESBLEUS S.A. · v2.0</div></div>`;
}
function navigate(p){S.page=p;renderSidebar();const pages={inicio:pageInicio,pedidos:pagePedidos,clientes:pageClientes,bandeja:pageBandeja,'mis-pedidos':pageMisPedidos,'mi-pedido':pageMiPedido,agentes:pageAgentes,reportes:pageReportes,tickets:pageTickets,'mis-tickets':pageMisTickets,comunicaciones:pageComunicaciones,'ia-gestion':pageIAGestion,'ia-factura':pageIAFactura,'ia-imagenes':pageIAImagenes};(pages[p]||pageInicio)();}

// UTILS
function id(i){return document.getElementById(i);}
function ls(s){return{pendiente:'Pendiente',enproceso:'En proceso',enviado:'Enviado',entregado:'Entregado',cancelado:'Cancelado'}[s]||s;}
function num(m){return parseFloat((m||'').replace(/[^\d.,]/g,'').replace(',','.')||0);}
function oid(o){return o.id||'';}
function findO(i){return S.orders.find(o=>o.id===i);}
function toast(msg,type='ok'){const w=id('toast-wrap'),t=document.createElement('div');t.className='toast';t.innerHTML=`<span>${{ok:'✅',err:'❌',warn:'⚠️',info:'ℹ️'}[type]||'ℹ️'}</span><span>${msg}</span>`;w.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3000);}
function openModal(html){id('modal-bg').style.display='flex';id('modal').innerHTML=html;}
function closeModal(){id('modal-bg').style.display='none';}
id('modal-bg').addEventListener('click',e=>{if(e.target===id('modal-bg'))closeModal();});

// PAGES
function pageInicio(){
  const role=S.session.role;
  const t={pendiente:0,enproceso:0,enviado:0,entregado:0,cancelado:0};
  let totalMonto=0,cobrado=0;
  S.orders.forEach(o=>{if(t[o.estado]!==undefined)t[o.estado]++;const m=num(o.monto);totalMonto+=m;if(o.pagado)cobrado+=m;});
  const pct=S.orders.length?Math.round(t.entregado/S.orders.length*100):0;
  let stats='';
  if(role!=='cliente'){
    stats=`<div class="stat-grid">
      <div class="stat c-accent"><div class="stat-icon">📦</div><div class="stat-lbl">Total pedidos</div><div class="stat-val">${S.orders.length}</div></div>
      <div class="stat c-warn"><div class="stat-icon">⏳</div><div class="stat-lbl">Pendientes</div><div class="stat-val" style="color:var(--warn)">${t.pendiente}</div></div>
      <div class="stat c-accent"><div class="stat-icon">🔄</div><div class="stat-lbl">En proceso</div><div class="stat-val" style="color:var(--accent)">${t.enproceso}</div></div>
      <div class="stat c-ok"><div class="stat-icon">✅</div><div class="stat-lbl">Entregados</div><div class="stat-val" style="color:var(--ok)">${t.entregado}</div></div>
      <div class="stat c-ok"><div class="stat-icon">💰</div><div class="stat-lbl">Cobrado</div><div class="stat-val" style="color:var(--ok);font-size:22px">$${cobrado.toLocaleString('es-AR')}</div></div>
      <div class="stat c-warn"><div class="stat-icon">📊</div><div class="stat-lbl">Efectividad</div><div class="stat-val" style="color:${pct>70?'var(--ok)':'var(--warn)'}">${pct}%</div></div>
    </div>`;
  }
  id('main').innerHTML=`<div class="page-title">Hola, ${S.session.name.split(' ')[0]} 👋</div><div class="page-sub">Bienvenido al sistema LESBLEUS S.A.</div>${stats}
  ${role==='encargado'?`<div class="card"><div class="card-head"><h3>Acciones rápidas</h3></div><div style="padding:16px;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" onclick="navigate('pedidos')">📦 Ver pedidos</button>
    <button class="btn btn-ghost btn-sm" onclick="navigate('ia-gestion')">🤖 Agente IA</button>
    <button class="btn btn-ghost btn-sm" onclick="navigate('ia-imagenes')">🖼️ Imágenes</button>
    <button class="btn btn-ghost btn-sm" onclick="navigate('reportes')">📊 Reportes</button>
  </div></div>`:''}`;
}

function pagePedidos(){
  const isEnc=S.session.role==='encargado';
  const filtro=(window._filtro||'').toLowerCase();
  const filtroEst=window._filtroEst||'';
  let list=S.orders;
  if(filtro)list=list.filter(o=>(o.producto||'').toLowerCase().includes(filtro)||(o.clienteNombre||'').toLowerCase().includes(filtro)||(o.id||'').toLowerCase().includes(filtro));
  if(filtroEst)list=list.filter(o=>o.estado===filtroEst);
  const rows=list.map(o=>`<tr>
    <td><b>${o.id}</b></td><td>${o.producto}</td><td>${o.clienteNombre||''}</td>
    <td><span class="pill s-${o.estado}">${ls(o.estado)}</span></td>
    <td>${o.fecha||''}</td><td>${o.monto||''}</td>
    <td class="td-actions">
      <button class="btn btn-ghost btn-sm" onclick="modalEditar('${o.id}')">✏️</button>
      ${o.tel?`<button class="btn btn-wa btn-sm" onclick="waNotif('${o.id}')">💬</button>`:''}
      ${isEnc?`<button class="btn btn-danger btn-sm" onclick="eliminar('${o.id}')">🗑</button>`:''}
    </td>
  </tr>`).join('')||`<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--muted)">Sin resultados.</td></tr>`;
  id('main').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div><div class="page-title">📦 Pedidos</div><div class="page-sub">${list.length} de ${S.orders.length} registros</div></div>
      <div style="display:flex;gap:8px">
        ${isEnc?`<button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇️ CSV</button>`:''}
        ${isEnc?`<button class="btn btn-primary btn-sm" onclick="modalNuevo()">+ Nuevo pedido</button>`:''}
      </div>
    </div>
    <div class="filter-bar">
      <input type="text" placeholder="🔍 Buscar..." value="${window._filtro||''}" oninput="window._filtro=this.value;pagePedidos()">
      <select onchange="window._filtroEst=this.value;pagePedidos()">
        <option value="">Todos los estados</option>
        ${['pendiente','enproceso','enviado','entregado','cancelado'].map(s=>`<option value="${s}"${filtroEst===s?' selected':''}>${ls(s)}</option>`).join('')}
      </select>
      ${(filtro||filtroEst)?`<button class="btn btn-ghost btn-sm" onclick="window._filtro='';window._filtroEst='';pagePedidos()">✕ Limpiar</button>`:''}
    </div>
    <div class="card"><div class="card-head"><h3>Listado</h3></div>
    <table><thead><tr><th>ID</th><th>Producto</th><th>Cliente</th><th>Estado</th><th>Fecha</th><th>Monto</th><th>Acciones</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

async function guardarCliente(cid){
  const nombre=id('cl-nombre').value.trim();
  if(!nombre){toast('El nombre es obligatorio','err');return;}
  const data={nombre,tel:id('cl-tel').value.trim(),email:id('cl-email').value.trim(),dni:id('cl-dni').value.trim(),tipo:id('cl-tipo').value,direccion:id('cl-dir').value.trim(),localidad:id('cl-loc').value.trim(),auto:id('cl-auto').value.trim(),notas:id('cl-notas').value.trim(),updatedAt:new Date().toLocaleString('es-AR')};
  if(cid){
    const c=S.clients.find(x=>x.id===cid);if(!c)return;
    Object.assign(c,data);toast('Cliente actualizado ✅','ok');
  }else{
    data.id='CLI-'+Date.now().toString(36).toUpperCase();data.createdAt=data.updatedAt;
    S.clients.push(data);toast('Cliente registrado ✅','ok');
  }
  await saveOrders();closeModal();navigate('clientes');
}

async function eliminarCliente(cid){
  const c=S.clients.find(x=>x.id===cid);if(!c)return;
  const pedidos=S.orders.filter(o=>o.clienteId===cid).length;
  if(!confirm(`¿Eliminar a "${c.nombre}"?${pedidos?` Tiene ${pedidos} pedido(s) vinculado(s).`:''}`))return;
  S.clients=S.clients.filter(x=>x.id!==cid);
  await saveOrders();toast('Cliente eliminado','warn');navigate('clientes');
}

function exportClientesCSV(){
  const h='ID,Nombre,Teléfono,Email,DNI/CUIT,Tipo,Dirección,Localidad,Vehículo,Pedidos,Notas,Registrado';
  const rows=S.clients.map(c=>{const p=S.orders.filter(o=>o.clienteId===c.id).length;return[c.id,c.nombre,c.tel,c.email,c.dni,c.tipo,c.direccion,c.localidad,c.auto,p,c.notas,c.createdAt].map(v=>`"${v||''}"`).join(',');});
  const blob=new Blob([[h,...rows].join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='clientes_lesbleus.csv';a.click();
}

async function callIA(prompt,resId){
  const el=id(resId);if(!el)return;
  el.style.display='block';el.innerHTML='<span class="spin"></span> Agente procesando...';
  try{
    const resp=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const raw=await resp.text();
    let data;
    try{data=JSON.parse(raw);}catch(e){el.textContent='❌ Respuesta inválida del servidor: '+raw.slice(0,200);return;}
    if(!resp.ok||data.error){
      const msg=typeof data.error==='object'?JSON.stringify(data.error):data.error;
      el.textContent='❌ Error ('+resp.status+'): '+(msg||raw.slice(0,200));
      return;
    }
    const texto=data.content?.map(c=>c.text||'').join('').trim();
    el.textContent=texto||'Sin respuesta.';
  }catch(e){el.textContent='❌ Error: '+e.message;}
}

async function runSupervisor(){
  const stats={total:S.orders.length,pendiente:S.orders.filter(o=>o.estado==='pendiente').length,enproceso:S.orders.filter(o=>o.estado==='enproceso').length,enviado:S.orders.filter(o=>o.estado==='enviado').length,sinAgente:S.orders.filter(o=>o.estado==='pendiente'&&!o.agente).length,sinFactura:S.orders.filter(o=>o.pagado&&!o.facturaEmitida).length};
  await callIA(`Sos el supervisor de pedidos de LESBLEUS S.A., empresa de repuestos automotores argentina. Analizá estos datos y generá un reporte ejecutivo en español con alertas urgentes y recomendaciones concretas: ${JSON.stringify(stats)}`,'res-supervisor');
}

async function runAsignador(){
  const pend=S.orders.filter(o=>o.estado==='pendiente'&&!o.agente);
  const agentes=Object.entries(USERS).filter(([k,v])=>v.role==='agente').map(([k,v])=>({user:k,name:v.name,carga:S.orders.filter(o=>o.agente===k&&o.estado==='enproceso').length}));
  if(!pend.length){const el=id('res-asignador');el.style.display='block';el.textContent='✅ No hay pedidos pendientes sin asignar.';return;}
  // Auto-asignar round-robin por carga
  let asignados=[];
  for(const o of pend){
    agentes.sort((a,b)=>a.carga-b.carga);
    const ag=agentes[0];
    o.agente=ag.user;o.estado='enproceso';ag.carga++;
    asignados.push(`${o.id} → ${ag.name}`);
  }
  saveOrders();
  const el=id('res-asignador');el.style.display='block';
  el.textContent=`✅ ${asignados.length} pedidos asignados automáticamente:\n\n${asignados.join('\n')}`;
  toast(`IA asignó ${asignados.length} pedidos.`);
}

  if(!activos.length){const el=id('res-comunicador');el.style.display='block';el.textContent='No hay pedidos activos con teléfono registrado.';return;}
  const lista=activos.map(o=>`- ${o.clienteNombre} (${o.producto}, estado: ${ls(o.estado)})`).join('\n');
  await callIA(`Sos el agente comunicador de LESBLEUS S.A. Generá un mensaje de WhatsApp personalizado para cada cliente, adaptado a su estado de pedido. Sé amigable y profesional. Clientes:\n${lista}`,'res-comunicador');
}

  const enviados=S.orders.filter(o=>o.estado==='enviado');
  const el=id('res-remito');el.style.display='block';
  if(!enviados.length){el.textContent='No hay pedidos en estado "enviado" para generar remitos.';return;}
  const lista=enviados.map(o=>`Pedido ${o.id}: ${o.clienteNombre}, ${o.producto}`).join('\n');
  await callIA(`Sos el agente de remitos de LESBLEUS S.A. (CUIT 30711725918, Colombia 104 Villa Martelli). Generá el texto del remito para cada uno de estos despachos:\n${lista}\n\nIncluí: número de remito, fecha, emisor, destinatario, descripción del producto, y espacio para firma.`,'res-remito');
}

// ACTIONS
function tomarPedido(oid){const o=findO(oid);if(!o)return;o.agente=S.session.user;o.estado='enproceso';saveOrders();toast('Pedido tomado ✅');pageBandeja();}
function waNotif(oid){const o=findO(oid);if(!o||!o.tel)return;const tel=o.tel.replace(/\D/g,'');const msg=`Hola ${o.clienteNombre}! Estado de tu pedido *${o.producto}*: ${ls(o.estado)}.`;window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);}
function exportCSV(){const h=['ID','Producto','Cliente','Estado','Fecha','Monto','Agente','Pagado'];const r=S.orders.map(o=>[o.id,o.producto,o.clienteNombre||'',o.estado,o.fecha||'',o.monto||'',o.agente||'',o.pagado?'Sí':'No']);const csv=[h,...r].map(row=>row.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pedidos_'+new Date().toISOString().split('T')[0]+'.csv';a.click();toast('CSV descargado.');}
function eliminar(oid){if(!confirm('¿Eliminar este pedido?'))return;S.orders=S.orders.filter(o=>o.id!==oid);saveOrders();toast('Pedido eliminado.','warn');pagePedidos();}

  openModal(`<h3>+ Nuevo pedido</h3>
    <div class="field-row">
      <div class="field"><label>Producto</label><input type="text" id="m-prod" placeholder="Ej: Amortiguador Monroe"></div>

    </div>
    <div class="field"><label>Descripción</label><textarea id="m-desc" placeholder="Detalle, modelo..."></textarea></div>
    <div class="field-row">

    </div>

      <div class="field"><label>Fecha</label><input type="date" id="m-fecha" value="${today}"></div>

function crearPedido(){
  const prod=id('m-prod').value.trim(),monto=id('m-monto').value.trim(),cnombre=id('m-cnombre').value.trim();
  if(!prod||!monto||!cnombre){toast('Completá producto, monto y nombre.','err');return;}
  const newId='ORD-'+String(Date.now()).slice(-6);
  S.orders.unshift({id:newId,producto:prod,monto,descripcion:id('m-desc').value.trim(),clienteNombre:cnombre,cliente:'cliente1',tel:id('m-tel').value.trim(),fecha:id('m-fecha').value,linkPago:id('m-link').value.trim(),estado:'pendiente',agente:'',pagado:false,facturaEmitida:false});
  saveOrders();closeModal();toast('Pedido creado ✅');pagePedidos();
}

function modalEditar(oid){
  const o=findO(oid);if(!o)return;
  openModal(`<h3>✏️ Editar pedido ${o.id}</h3>
    <div class="field-row">
      <div class="field"><label>Producto</label><input type="text" id="e-prod" value="${o.producto||''}"></div>
      <div class="field"><label>Monto</label><input type="text" id="e-monto" value="${o.monto||''}"></div>
    </div>
    <div class="field"><label>Nombre cliente</label><input type="text" id="e-cnombre" value="${o.clienteNombre||''}"></div>
    <div class="field"><label>Teléfono WA</label><input type="text" id="e-tel" value="${o.tel||''}"></div>
    <div class="field-row">
      <div class="field"><label>Estado</label>
        <select id="e-estado">${['pendiente','enproceso','enviado','entregado','cancelado'].map(s=>`<option value="${s}"${o.estado===s?' selected':''}>${ls(s)}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Fecha</label><input type="date" id="e-fecha" value="${o.fecha||''}"></div>
    </div>
    <div class="field"><label>Link pago MP</label><input type="text" id="e-link" value="${o.linkPago||''}"></div>
    <div class="field" style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="e-pagado"${o.pagado?' checked':''} style="width:auto">
      <label style="text-transform:none;letter-spacing:0;font-size:13px">Marcar como pagado</label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdicion('${oid}')">💾 Guardar</button>
    </div>`);
}

function guardarEdicion(oid){
  const o=findO(oid);if(!o)return;
  o.producto=id('e-prod').value.trim();o.monto=id('e-monto').value.trim();
  o.clienteNombre=id('e-cnombre').value.trim();o.tel=id('e-tel').value.trim();
  o.estado=id('e-estado').value;o.fecha=id('e-fecha').value;
  o.linkPago=id('e-link').value.trim();o.pagado=id('e-pagado').checked;
  saveOrders();closeModal();toast('Pedido guardado ✅');pagePedidos();
}

function pageIAImagenes(){
  id('main').innerHTML=`<div class="page-title">🖼️ Agente de Imágenes</div><div class="page-sub">Busca y guarda imágenes reales de productos en la tienda</div>
    <div class="ia-card">

async function runImgUno(){
  const url=id('img-query').value.trim();
  const prodId=id('img-prodid').value.trim();
  const el=id('res-img-uno');el.style.display='block';
  if(!url){el.textContent='⚠️ Ingresá la URL de la imagen.';return;}
  if(!prodId){el.textContent='⚠️ Ingresá el ID del producto.';return;}
  if(!url.startsWith('http')){el.textContent='⚠️ La URL debe empezar con http o https.';return;}
  el.innerHTML='<span class="spin"></span> Guardando imagen...';
  try{
    await saveImgFirebase(prodId, url);
    el.innerHTML=`✅ Imagen guardada para producto ID ${prodId}:<br><img src="${url}" style="max-width:180px;border-radius:8px;margin-top:8px;border:1px solid var(--border)" onerror="this.outerHTML='❌ La URL no cargó. Verificá que sea una imagen directa (.jpg, .png, .webp).'">`;
    toast('Imagen guardada correctamente.','ok');
  }catch(e){el.textContent='❌ Error: '+e.message;}
}

];

async function runImgLote(){
  const el=id('res-img-lote');el.style.display='block';
  el.innerHTML='<b>🖼️ Guardando imágenes para '+LOTE_PRODUCTOS.length+' productos...</b><br><br>';
  let guardadas=0;
  for(const item of LOTE_PRODUCTOS){
    const cached=localStorage.getItem('img_'+item.id);
    if(cached){el.innerHTML+=`✅ ID ${item.id} (${item.name}) — ya tiene imagen<br>`;guardadas++;continue;}
    try{
      await saveImgFirebase(item.id, item.url);
      el.innerHTML+=`✅ ID ${item.id} — ${item.name} guardada<br>`;
      guardadas++;
    }catch(e){el.innerHTML+=`❌ ID ${item.id} — error: ${e.message}<br>`;}
    await new Promise(r=>setTimeout(r,200));
  }
  el.innerHTML+=`<br><b>🎉 ${guardadas}/${LOTE_PRODUCTOS.length} imágenes guardadas. Recargá la tienda para verlas.</b>`;
  toast(guardadas+' imágenes guardadas en la tienda.','ok');
}
